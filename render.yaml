# Blueprint Render : https://render.com/docs/blueprint-spec
# Depuis le dashboard : New > Blueprint > connecter ce depot, puis ajuster region / plan.
#
# Ne pas utiliser `corepack enable` sur Render : le FS est en lecture seule sous /usr/bin (EROFS).
# pnpm est installe via le script officiel dans $HOME, puis le demarrage utilise npx (node_modules local).
#
# Variables a renseigner dans Render (Environment) si non presentes ici :
# DATABASE_URL, JWT_*, SMTP_*, CLOUDINARY_URL, FRONTEND_HOME_URL, CORS_ORIGINS, etc.
# RENDER_EXTERNAL_URL est injecte automatiquement par Render (non a renseigner) : utilise pour CORS + Swagger.
# Voir .env.example

services:
  - type: web
    name: sendiaba-mvp-api
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    buildCommand: curl -fsSL https://get.pnpm.io/install.sh | PNPM_VERSION=10.33.0 sh - && export PNPM_HOME="$HOME/.local/share/pnpm" && export PATH="$PNPM_HOME:$PATH" && pnpm install --frozen-lockfile && pnpm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api/v1
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 3600s
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_HOME_URL
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
